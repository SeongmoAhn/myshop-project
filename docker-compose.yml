version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: myshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: myshop
    ports:
      - "3306:3306"

  redis:
    image: redis:7
    container_name: myshop-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: myshop-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/myshop?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: myshop-secret-key-must-be-at-least-32-characters-long
    depends_on:
      - mysql
      - redis