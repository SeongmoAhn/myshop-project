spring:
  datasource:
    url: jdbc:mysql://localhost:3306/myshop?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: myshop-secret-key-must-be-at-least-32-characters-long
  expiration: 86400000